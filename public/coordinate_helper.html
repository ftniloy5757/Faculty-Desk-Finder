<!DOCTYPE html>
<html>
<head>
  <title>Coordinate Helper</title>
  <style>
    body { margin: 0; padding: 0; background: #222; color: white; font-family: sans-serif; }
    #container { position: relative; display: inline-block; }
    img { display: block; width: 2608px; height: 1512px; }
    #marker {
      position: absolute;
      width: 10px;
      height: 10px;
      background: red;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #444;
      font-family: monospace;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="info">
    Click on the image to log coordinates.<br>
    Coordinates: <span id="coords">X: 0, Y: 0</span>
  </div>
  <div id="container">
    <img id="map" src="map.png" alt="Map">
    <div id="marker"></div>
  </div>
  <script>
    const map = document.getElementById('map');
    const marker = document.getElementById('marker');
    const coords = document.getElementById('coords');
    
    map.addEventListener('click', (e) => {
      const rect = map.getBoundingClientRect();
      const x = Math.round(e.clientX - rect.left);
      const y = Math.round(e.clientY - rect.top);
      console.log(`CLICKED COORDINATE: ${x}, ${y}`);
      coords.innerText = `X: ${x}, Y: ${y}`;
      marker.style.left = x + 'px';
      marker.style.top = y + 'px';
    });
  </script>
</body>
</html>
